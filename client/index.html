<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Moodlink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/Style.css">
  <link rel="icon" href="Assets/logo.svg" type="image/svg+xml">
</head>
<body class="auth-body">
  <div class="background-effects"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

  <main class="auth-page page-content">
    <div class="auth-brand fade-in-up">
      <img src="Assets/logo.svg" alt="Moodlink" class="auth-logo">
      <h1>Moodlink</h1>
      <p>Your space for real connection and emotional support.</p>
    </div>

    <div class="glass-card auth-card fade-in-up delay-1">
      <div class="auth-tabs">
        <button type="button" class="active" data-auth-tab="login">Log In</button>
        <button type="button" data-auth-tab="register">Sign Up</button>
      </div>

      <div data-auth-panel="login">
        <h2 class="text-gradient">Welcome back</h2>
        <p class="auth-sub">Enter your credentials to continue.</p>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-primary btn-full glow">Log In</button>
        </form>
      </div>

      <div data-auth-panel="register" hidden>
        <h2 class="text-gradient">Create account</h2>
        <p class="auth-sub">Join Moodlink — no mood check-in required yet.</p>
        <form id="register-form">
          <div class="form-group">
            <label for="reg-name">Full name</label>
            <input type="text" id="reg-name" placeholder="Your name" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="At least 6 characters" minlength="6" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn-primary btn-full glow">Sign Up</button>
        </form>
      </div>

      <div id="form-response" class="form-message"></div>
    </div>
  </main>

  <script>
  document.querySelectorAll("a").forEach(link => {

    const href = link.getAttribute("href");

    if (
      href &&
      !href.startsWith("#") &&
      !href.startsWith("javascript")
    ) {

      link.addEventListener("click", function(e) {

        e.preventDefault();

        document.body.classList.add("fade-out");

        setTimeout(() => {
          window.location.href = href;
        }, 500);

      });

    }

  });
</script>

  <script type="module" src="js/transitions.js"></script>
  <script type="module" src="js/auth-page.js"></script>
</body>
</html>
